services:
  goblin:
    container_name: goblin-bot
    image: registry.brabson.me/goblin:latest
    environment:
      GOBLIN_CONFIG_PATH: ${GOBLIN_CONFIG_PATH}
    entrypoint: /goblin
    restart: unless-stopped
    depends_on:
      - mongodb

  mongodb:
    container_name: "goblin_mongo"
    image: mongo:latest
    environment:
      GOBLIN_CONFIG_PATH: ${GOBLIN_CONFIG_PATH}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data_container:/data/db

volumes:
  mongodb_data_container:

